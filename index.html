<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Kickabout Team Sheet — team picker & ratings</title>
<style>
  :root{
    --bg:#0C1411; --surface:#14201C; --surface2:#1B2A25; --line:#26362F;
    --text:#E8F1EC; --muted:#89998F; --faint:#5C6B63;
    --lime:#C4F24E; --lime-dim:#8fb238;
    --atk:#FF7A59; --def:#4FC3F7; --danger:#FF5A6E; --gold:#F5C451;
    --r:16px; --r-sm:11px;
    --shadow:0 8px 30px rgba(0,0,0,.35);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#050908;color:var(--text);}
  body{display:flex;justify-content:center;min-height:100vh;}
  .phone{
    width:100%;max-width:460px;min-height:100vh;background:
      radial-gradient(120% 60% at 50% -10%, #15251f 0%, var(--bg) 55%);
    display:flex;flex-direction:column;position:relative;overflow:hidden;
    border-left:1px solid #0c1310;border-right:1px solid #0c1310;
  }
  @media(min-width:520px){ .phone{margin:22px 0;min-height:calc(100vh - 44px);border-radius:28px;
    border:1px solid #1c2a25;box-shadow:var(--shadow);overflow:hidden;} body{align-items:flex-start;} }

  /* header */
  header{padding:22px 20px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .badge{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--lime),var(--lime-dim));
    display:grid;place-items:center;color:#0c1710;font-weight:800;font-size:19px;box-shadow:0 4px 14px rgba(196,242,78,.25);}
  h1{font-size:17px;margin:0;letter-spacing:-.02em;font-weight:800;white-space:nowrap;}
  .sub{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}
  .hbtn{background:var(--surface2);border:1px solid var(--line);color:var(--muted);
    border-radius:9px;padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer;}
  .hbtn:active{transform:scale(.96);}

  /* view */
  #view{flex:1;overflow-y:auto;padding:6px 16px 108px;-webkit-overflow-scrolling:touch;}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:20px 2px 10px;}
  .eyebrow:first-child{margin-top:8px;}

  /* cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:12px;}
  .grow{flex:1;min-width:0;}
  .nowrap{white-space:nowrap;}
  .muted{color:var(--muted);} .faint{color:var(--faint);}
  .tnum{font-variant-numeric:tabular-nums;}

  /* player row */
  .prow{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px;}
  .pname{font-weight:700;font-size:15px;letter-spacing:-.01em;}
  .pmeta{font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums;}
  .ovr{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex:none;
    background:linear-gradient(150deg,#1f2f28,#182420);border:1px solid #2c3d35;position:relative;}
  .ovr b{font-size:19px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .ovr span{font-size:8px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-top:2px;}
  .adbars{width:96px;flex:none;}
  .bar{height:6px;border-radius:4px;background:#22322c;overflow:hidden;margin-bottom:5px;position:relative;}
  .bar i{display:block;height:100%;border-radius:4px;}
  .bar.atk i{background:var(--atk);} .bar.def i{background:var(--def);}
  .barlab{font-size:9px;letter-spacing:.08em;color:var(--faint);display:flex;justify-content:space-between;}
  .barlab .atk{color:var(--atk);} .barlab .def{color:var(--def);}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
    font-weight:700;font-size:15px;border-radius:13px;padding:14px 16px;width:100%;letter-spacing:-.01em;}
  .btn.primary{background:linear-gradient(150deg,var(--lime),var(--lime-dim));color:#0b1610;box-shadow:0 6px 18px rgba(196,242,78,.22);}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line);}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn.sm{padding:9px 12px;font-size:13px;width:auto;border-radius:10px;}
  .btn:active{transform:translateY(1px) scale(.995);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btnrow{display:flex;gap:9px;}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{padding:9px 13px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
    font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--muted);}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
  .chip.on{background:rgba(196,242,78,.12);border-color:var(--lime-dim);color:var(--text);}
  .chip.on .dot{background:var(--lime);box-shadow:0 0 8px var(--lime);}
  .chip .r{font-variant-numeric:tabular-nums;color:var(--faint);font-weight:700;font-size:12px;}
  .chip.on .r{color:var(--lime-dim);}

  /* team columns */
  .teams{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .team{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 11px;}
  .team.a{border-top:2px solid var(--lime);} .team.b{border-top:2px solid var(--def);}
  .team h4{margin:0 0 3px;font-size:13px;font-weight:800;letter-spacing:.02em;}
  .team .savg{font-size:11px;color:var(--muted);margin-bottom:10px;font-variant-numeric:tabular-nums;}
  .tp{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:7px 8px;border-radius:9px;
    background:var(--surface2);margin-bottom:6px;cursor:pointer;}
  .tp:active{background:#223129;}
  .tp .n{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tp .o{font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;flex:none;}
  .tp .mv{color:var(--faint);font-size:13px;flex:none;}

  /* balance meter */
  .meter{margin:12px 0 4px;}
  .meter .track{height:8px;border-radius:5px;background:linear-gradient(90deg,var(--lime) 0%, #2a3a32 50%, var(--def) 100%);
    position:relative;opacity:.35;}
  .meter .mk{position:absolute;top:-4px;width:4px;height:16px;border-radius:3px;background:var(--text);
    transform:translateX(-50%);box-shadow:0 0 0 3px rgba(12,20,17,.8);}
  .meter .cap{display:flex;justify-content:space-between;font-size:10.5px;color:var(--faint);margin-top:7px;letter-spacing:.04em;}
  .baltag{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.02em;}
  .baltag.good{background:rgba(196,242,78,.14);color:var(--lime);}
  .baltag.ok{background:rgba(245,196,81,.14);color:var(--gold);}
  .baltag.off{background:rgba(255,90,110,.14);color:var(--danger);}

  /* score entry */
  .score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
  .sside{text-align:center;} .sside h5{margin:0 0 8px;font-size:12px;font-weight:800;color:var(--muted);}
  .stepper{display:flex;align-items:center;justify-content:center;gap:10px;}
  .stepper button{width:38px;height:38px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);
    color:var(--text);font-size:21px;font-weight:700;cursor:pointer;line-height:1;}
  .stepper button:active{transform:scale(.92);}
  .stepper .val{font-size:30px;font-weight:800;min-width:34px;text-align:center;font-variant-numeric:tabular-nums;}
  .vs{font-size:12px;color:var(--faint);font-weight:800;letter-spacing:.1em;}

  .ga-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
  .ga-row:last-child{border-bottom:none;}
  .ga-row .n{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mini{display:flex;align-items:center;gap:6px;}
  .mini label{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;width:14px;}
  .mini button{width:26px;height:26px;border-radius:7px;background:var(--surface2);border:1px solid var(--line);
    color:var(--text);font-weight:700;cursor:pointer;line-height:1;font-size:15px;}
  .mini .v{width:16px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums;font-size:13px;}

  /* stats */
  .stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:4px;}
  .scard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;}
  .scard .lab{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:700;}
  .scard .who{font-size:16px;font-weight:800;margin-top:6px;letter-spacing:-.01em;}
  .scard .val{font-size:12px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums;}
  .scard.hl{grid-column:span 2;background:linear-gradient(150deg,#1c2a1a,#14201c);border-color:#33482c;}
  .tablewrap{overflow-x:auto;margin:0 -2px;}
  table{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums;}
  th,td{padding:9px 8px;text-align:right;white-space:nowrap;}
  th{color:var(--faint);font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);}
  td{border-bottom:1px solid #1c2a24;}
  th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--bg);}
  td:first-child{font-weight:700;}
  tr:last-child td{border-bottom:none;}
  .duo{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;margin-bottom:8px;}
  .duo .names{font-weight:700;font-size:14px;} .duo .rec{font-size:11px;color:var(--muted);margin-top:2px;}
  .duo .pct{font-size:18px;font-weight:800;color:var(--lime);font-variant-numeric:tabular-nums;}

  /* history */
  .match{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:9px;}
  .match .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .match .date{font-size:11px;color:var(--faint);letter-spacing:.04em;}
  .match .sc{display:flex;align-items:center;gap:14px;justify-content:center;margin:2px 0 8px;}
  .match .sc .t{flex:1;font-size:12.5px;font-weight:600;}
  .match .sc .t.a{text-align:right;} .match .sc .t.b{text-align:left;}
  .match .sc .n{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
  .match .sc .win{color:var(--lime);} .match .sc .lose{color:var(--faint);}
  .del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;font-weight:600;padding:4px;}
  .del:active{color:var(--danger);}

  /* empty state */
  .empty{text-align:center;padding:46px 24px;}
  .empty .ico{font-size:40px;margin-bottom:14px;}
  .empty h3{margin:0 0 6px;font-size:17px;font-weight:800;}
  .empty p{margin:0 0 20px;color:var(--muted);font-size:13.5px;line-height:1.5;}

  /* tab bar */
  nav{position:absolute;bottom:0;left:0;right:0;background:rgba(10,17,14,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  nav button{flex:1;background:none;border:none;color:var(--faint);cursor:pointer;padding:6px 2px;
    display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:700;letter-spacing:.02em;}
  nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  nav button.on{color:var(--lime);}

  /* modal / input */
  .modal{position:absolute;inset:0;background:rgba(4,8,6,.72);display:flex;align-items:flex-end;z-index:50;}
  .sheet{width:100%;background:var(--surface);border-top-left-radius:22px;border-top-right-radius:22px;
    border:1px solid var(--line);padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:up .22s ease;}
  @keyframes up{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet h3{margin:0 0 14px;font-size:17px;font-weight:800;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px;}
  input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:11px;
    padding:13px 14px;color:var(--text);font-size:16px;font-weight:600;outline:none;}
  input[type=text]:focus{border-color:var(--lime-dim);}
  .sliderow{display:flex;align-items:center;gap:12px;}
  input[type=range]{flex:1;accent-color:var(--lime);}
  .slideval{width:34px;text-align:center;font-weight:800;font-variant-numeric:tabular-nums;}

  /* toast */
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--lime);color:#0b1610;font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:12px;
    opacity:0;transition:.25s;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.warn{background:var(--gold);} .toast.bad{background:var(--danger);color:#fff;}
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="brand">
      <div class="badge">⚽</div>
      <div>
        <h1>Kickabout Team Sheet</h1>
        <div class="sub" id="subhead">Weekly team picker</div>
      </div>
    </div>
    <button class="hbtn" data-action="menu">•••</button>
  </header>
  <div id="view"></div>
  <nav>
    <button data-tab="squad" class="on"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Squad</button>
    <button data-tab="match"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/></svg>Match day</button>
    <button data-tab="stats"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Stats</button>
    <button data-tab="history"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5M12 8v4l3 2"/></svg>History</button>
    <button data-tab="guide"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>Guide</button>
  </nav>
  <div id="toast" class="toast"></div>
</div>

<script>
// ==================== ENGINE (mirrors tested engine.js) ====================
const CONFIG={BASE_RATING:50,DEFAULT_AVG_GOALS:3,SPREAD:120,K_ATTACK:2.0,K_DEFENSE:2.0,GOAL_BONUS:0.5,ASSIST_BONUS:0.3,MIN:0,MAX:100};
const clamp=(x,lo=CONFIG.MIN,hi=CONFIG.MAX)=>Math.max(lo,Math.min(hi,x));
const sig=x=>1/(1+Math.exp(-x));
const mean=a=>a.length?a.reduce((s,b)=>s+b,0)/a.length:0;
// Expected goals centered on the group's OWN average scoring level.
const expectedGoals=(d,avg)=>clamp(2*avg*sig(d/CONFIG.SPREAD),0.2,6*avg);
function leagueAvgGoals(matches){const v=matches.filter(m=>m.teamA.length&&m.teamB.length);
  if(!v.length)return CONFIG.DEFAULT_AVG_GOALS;
  return Math.max(0.5,v.reduce((s,m)=>s+m.scoreA+m.scoreB,0)/(2*v.length));}

function computeStats(players,matches){
  const P={};
  for(const p of players){P[p.id]={id:p.id,name:p.name,attack:p.baseAttack??50,defense:p.baseDefense??50,
    games:0,wins:0,draws:0,losses:0,goals:0,assists:0,goalsFor:0,goalsAgainst:0,teammates:{}};}
  const avg=leagueAvgGoals(matches);
  const ord=[...matches].sort((a,b)=>(a.date||0)-(b.date||0));
  for(const m of ord){
    const A=m.teamA.filter(id=>P[id]),B=m.teamB.filter(id=>P[id]);
    if(!A.length||!B.length)continue;
    const aAtk=mean(A.map(id=>P[id].attack)),aDef=mean(A.map(id=>P[id].defense));
    const bAtk=mean(B.map(id=>P[id].attack)),bDef=mean(B.map(id=>P[id].defense));
    const xgA=expectedGoals(aAtk-bDef,avg),xgB=expectedGoals(bAtk-aDef,avg);
    const adA=CONFIG.K_ATTACK*(m.scoreA-xgA),ddA=CONFIG.K_DEFENSE*(xgB-m.scoreB);
    const adB=CONFIG.K_ATTACK*(m.scoreB-xgB),ddB=CONFIG.K_DEFENSE*(xgA-m.scoreA);
    for(const id of A){P[id].attack=clamp(P[id].attack+adA);P[id].defense=clamp(P[id].defense+ddA);}
    for(const id of B){P[id].attack=clamp(P[id].attack+adB);P[id].defense=clamp(P[id].defense+ddB);}
    const g=m.goals||{},as=m.assists||{};
    for(const id of [...A,...B]){const gg=g[id]||0,aa=as[id]||0;
      if(gg)P[id].attack=clamp(P[id].attack+CONFIG.GOAL_BONUS*gg);
      if(aa)P[id].attack=clamp(P[id].attack+CONFIG.ASSIST_BONUS*aa);}
    const aW=m.scoreA>m.scoreB,bW=m.scoreB>m.scoreA;
    const rec=(ids,gf,ga,won,lost)=>{for(const id of ids){const s=P[id];
      s.games++;s.goalsFor+=gf;s.goalsAgainst+=ga;if(won)s.wins++;else if(lost)s.losses++;else s.draws++;
      s.goals+=g[id]||0;s.assists+=as[id]||0;
      for(const mate of ids){if(mate===id)continue;const t=(s.teammates[mate]||={games:0,wins:0});t.games++;if(won)t.wins++;}}};
    rec(A,m.scoreA,m.scoreB,aW,bW);rec(B,m.scoreB,m.scoreA,bW,aW);
  }
  return Object.values(P).map(s=>({...s,attack:Math.round(s.attack),defense:Math.round(s.defense),
    overall:Math.round((s.attack+s.defense)/2),winPct:s.games?Math.round(s.wins/s.games*100):0}));
}
function combinations(n,k){const out=[],c=[];(function rec(st){if(c.length===k){out.push(c.slice());return;}
  for(let i=st;i<n;i++){c.push(i);rec(i+1);c.pop();}})(0);return out;}
function suggestTeams(av){
  const n=av.length;if(n<2)return{teamA:av.map(p=>p.id),teamB:[],alternatives:[]};
  const sizeA=Math.floor(n/2);
  const ev=idxA=>{const s=new Set(idxA);const a=av.filter((_,i)=>s.has(i)),b=av.filter((_,i)=>!s.has(i));
    const gap=Math.abs(mean(a.map(p=>p.overall))-mean(b.map(p=>p.overall)));
    return{teamA:a.map(p=>p.id),teamB:b.map(p=>p.id),gap};};
  let sp;
  if(n<=16){sp=combinations(n,sizeA).map(ev);}
  else{const ord=av.map((_,i)=>i).sort((i,j)=>av[j].overall-av[i].overall);const a=[],b=[];let sa=0,sb=0;
    for(const i of ord){if(a.length<=b.length&&(sa<=sb||b.length>=n-sizeA)){a.push(i);sa+=av[i].overall;}else{b.push(i);sb+=av[i].overall;}}
    sp=[ev(a)];}
  sp.sort((x,y)=>x.gap-y.gap);
  const seen=new Set(),uniq=[];
  for(const s of sp){const k=[...s.teamA].sort().join(','),mir=[...s.teamB].sort().join(',');
    if(seen.has(k)||seen.has(mir))continue;seen.add(k);uniq.push(s);if(uniq.length>=12)break;}
  return{...uniq[0],alternatives:uniq};
}
function bestDuos(stats,minG=2){const byId=Object.fromEntries(stats.map(s=>[s.id,s]));const out=[],seen=new Set();
  for(const s of stats)for(const[mid,r]of Object.entries(s.teammates)){if(r.games<minG)continue;
    const k=[s.id,mid].sort().join('|');if(seen.has(k))continue;seen.add(k);
    out.push({a:s.name,b:byId[mid]?.name||'?',games:r.games,wins:r.wins,winPct:Math.round(r.wins/r.games*100)});}
  return out.sort((x,y)=>y.winPct-x.winPct||y.games-x.games);}

// ==================== STATE ====================
const KEY='kickabout.v1';
let state={players:[],matches:[],available:[],draft:null};
let tab='squad';
let uid=()=> (crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.random().toString(16).slice(2));

function load(){try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);
  state.players=d.players||[];state.matches=d.matches||[];state.available=d.available||[];}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(
  {players:state.players,matches:state.matches,available:state.available}));}catch(e){
  toast('Storage blocked — open the downloaded file directly in your browser','bad');}
  scheduleBackup();}

// ---- Google Sheet backup (via an Apps Script web app URL the user provides) ----
const CLOUD_KEY='kickabout.cloudUrl', LASTBK_KEY='kickabout.lastBackup';
function getCloudUrl(){try{return localStorage.getItem(CLOUD_KEY)||'';}catch(e){return '';}}
function setCloudUrl(u){try{u?localStorage.setItem(CLOUD_KEY,u):localStorage.removeItem(CLOUD_KEY);}catch(e){}}
let backupTimer=null;
function scheduleBackup(){if(!getCloudUrl())return;clearTimeout(backupTimer);backupTimer=setTimeout(()=>backupToCloud(true),1500);}
function backupToCloud(silent){
  const u=getCloudUrl();if(!u){if(!silent)toast('Add your Web App URL first','warn');return;}
  const payload=JSON.stringify({players:state.players,matches:state.matches,ts:Date.now()});
  fetch(u,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:payload})
    .then(()=>{try{localStorage.setItem(LASTBK_KEY,String(Date.now()));}catch(e){}
      if(!silent)toast('Sent to Google Sheet');})
    .catch(()=>{if(!silent)toast('Backup failed — check the URL','bad');});
}
function importData(obj){
  if(!obj||!Array.isArray(obj.players)||!Array.isArray(obj.matches))throw new Error('Not a valid backup');
  state.players=obj.players;state.matches=obj.matches;state.available=[];state.draft=null;save();
}
function restoreFromCloud(){
  const u=getCloudUrl();if(!u){toast('Add your Web App URL first','warn');return;}
  fetch(u).then(r=>r.json()).then(obj=>{importData(obj);closeSheet();render();toast('Restored from Google Sheet');})
    .catch(()=>{closeSheet();pasteSheet();toast('Couldn\u2019t read it directly — paste instead','warn');});
}

function stats(){return computeStats(state.players,state.matches);}
function statMap(){return Object.fromEntries(stats().map(s=>[s.id,s]));}

// ==================== HELPERS ====================
const $=s=>document.querySelector(s);
const view=$('#view');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastT;
function toast(msg,kind){const t=$('#toast');t.textContent=msg;t.className='toast show'+(kind?' '+kind:'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2200);}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})
  +' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}

// ==================== RENDER ====================
function render(){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  $('#subhead').textContent={squad:'Your squad',match:'Pick teams & log a result',stats:'Ratings & records',history:'Past matches',guide:'How it works'}[tab];
  view.scrollTop=0;
  if(tab==='squad')renderSquad();
  else if(tab==='match')renderMatch();
  else if(tab==='stats')renderStats();
  else if(tab==='history')renderHistory();
  else renderGuide();
}

function ovrBadge(s){return `<div class="ovr"><b>${s.overall}</b><span>OVR</span></div>`;}
function adBars(s){return `<div class="adbars">
  <div class="bar atk"><i style="width:${s.attack}%"></i></div>
  <div class="bar def"><i style="width:${s.defense}%"></i></div>
  <div class="barlab"><span class="atk">ATK ${s.attack}</span><span class="def">DEF ${s.defense}</span></div></div>`;}

function renderSquad(){
  const S=stats().sort((a,b)=>b.overall-a.overall);
  if(!state.players.length){
    view.innerHTML=`<div class="empty"><div class="ico">👥</div><h3>No players yet</h3>
      <p>Add the regulars from your kickabout, then head to Match day to pick balanced teams.</p>
      <div class="btnrow"><button class="btn primary" data-action="addPlayer">Add a player</button></div></div>`;
    return;
  }
  view.innerHTML=`<div class="eyebrow">${state.players.length} players</div>`+
    S.map(s=>`<div class="prow" data-action="editPlayer" data-id="${s.id}">
      ${ovrBadge(s)}
      <div class="grow"><div class="pname">${esc(s.name)}</div>
        <div class="pmeta">${s.games?`${s.games} games · ${s.wins}-${s.draws}-${s.losses} · ${s.winPct}% win`:'No games yet'}</div></div>
      ${adBars(s)}
    </div>`).join('')+
    `<div style="height:8px"></div><button class="btn primary" data-action="addPlayer">Add a player</button>`;
}

function renderMatch(){
  const S=statMap();
  const avail=state.available.filter(id=>S[id]);
  const chips=stats().sort((a,b)=>b.overall-a.overall).map(s=>{
    const on=state.available.includes(s.id);
    return `<div class="chip ${on?'on':''}" data-action="toggleAvail" data-id="${s.id}">
      <span class="dot"></span>${esc(s.name)}<span class="r">${s.overall}</span></div>`;}).join('');

  let teamsHtml='';
  if(state.draft){
    const d=state.draft;
    const tavg=ids=>ids.length?Math.round(mean(ids.map(id=>S[id].overall))):0;
    const gap=Math.abs(tavg(d.teamA)-tavg(d.teamB));
    const pos=50+Math.max(-45,Math.min(45,(tavg(d.teamB)-tavg(d.teamA))*3));
    const tag=gap<2?['good','Balanced']:gap<5?['ok',`${gap} apart`]:['off',`${gap} apart`];
    const col=(ids,cls,label)=>`<div class="team ${cls}"><h4>${label}</h4>
      <div class="savg">avg OVR ${tavg(ids)} · ${ids.length} players</div>
      ${ids.map(id=>`<div class="tp" data-action="movePlayer" data-id="${id}">
        <span class="n">${esc(S[id].name)}</span><span class="o">${S[id].overall}</span><span class="mv">⇄</span></div>`).join('')||'<div class="muted" style="font-size:12px">empty</div>'}</div>`;
    teamsHtml=`
      <div class="eyebrow">Suggested teams</div>
      <div class="teams">${col(d.teamA,'a','Team A')}${col(d.teamB,'b','Team B')}</div>
      <div class="card meter"><div class="row" style="justify-content:space-between;margin-bottom:10px">
        <span class="muted" style="font-size:12px;font-weight:700">Match balance</span>
        <span class="baltag ${tag[0]}">${tag[1]}</span></div>
        <div class="track"><div class="mk" style="left:${pos}%"></div></div>
        <div class="cap"><span>Team A stronger</span><span>even</span><span>Team B stronger</span></div>
      </div>
      <div class="btnrow"><button class="btn ghost" data-action="reshuffle">↻ Shuffle</button>
        <button class="btn ghost" data-action="clearDraft">Clear</button></div>
      ${renderResultEntry(d,S)}`;
  }

  view.innerHTML=`
    <div class="eyebrow">Who's playing this week? <span class="faint" style="text-transform:none;letter-spacing:0">(${avail.length} in)</span></div>
    <div class="chips">${chips||'<span class="muted">Add players in the Squad tab first.</span>'}</div>
    <div style="height:14px"></div>
    <button class="btn primary" data-action="suggest" ${avail.length<2?'disabled':''}>
      ${state.draft?'Re-pick teams':'Suggest balanced teams'} ${avail.length>=2?`· ${avail.length}`:''}</button>
    ${teamsHtml}`;
}

function renderResultEntry(d,S){
  const all=[...d.teamA,...d.teamB];
  const gaOpen=d.gaOpen;
  const rows=all.map(id=>`<div class="ga-row"><span class="n">${esc(S[id].name)}</span>
    <div class="mini"><label>G</label><button data-action="ga" data-id="${id}" data-f="goals" data-d="-1">−</button>
      <span class="v">${d.goals[id]||0}</span><button data-action="ga" data-id="${id}" data-f="goals" data-d="1">+</button></div>
    <div class="mini"><label>A</label><button data-action="ga" data-id="${id}" data-f="assists" data-d="-1">−</button>
      <span class="v">${d.assists[id]||0}</span><button data-action="ga" data-id="${id}" data-f="assists" data-d="1">+</button></div>
  </div>`).join('');
  return `
    <div class="eyebrow">Final score</div>
    <div class="card">
      <div class="score">
        <div class="sside"><h5>TEAM A</h5><div class="stepper">
          <button data-action="score" data-t="A" data-d="-1">−</button>
          <span class="val">${d.scoreA}</span>
          <button data-action="score" data-t="A" data-d="1">+</button></div></div>
        <div class="vs">VS</div>
        <div class="sside"><h5>TEAM B</h5><div class="stepper">
          <button data-action="score" data-t="B" data-d="-1">−</button>
          <span class="val">${d.scoreB}</span>
          <button data-action="score" data-t="B" data-d="1">+</button></div></div>
      </div>
    </div>
    <button class="btn ghost" data-action="toggleGA" style="margin-bottom:10px">
      ${gaOpen?'▲ Hide goals & assists':'＋ Add goals & assists (optional)'}</button>
    ${gaOpen?`<div class="card">${rows}</div>`:''}
    <button class="btn primary" data-action="saveMatch">Save match & update ratings</button>
    <div style="height:6px"></div>`;
}

function renderStats(){
  const S=stats();
  const played=S.filter(s=>s.games>0);
  if(!state.matches.length){
    view.innerHTML=`<div class="empty"><div class="ico">📊</div><h3>No stats yet</h3>
      <p>Play a match on Match day and the ratings, leaderboards and records will show up here.</p></div>`;
    return;
  }
  const top=(arr,f)=>arr.slice().sort((a,b)=>f(b)-f(a))[0];
  const scorer=top(played,s=>s.goals),assist=top(played,s=>s.assists),
        rated=top(played,s=>s.overall),winner=top(played.filter(s=>s.games>=2),s=>s.winPct)||top(played,s=>s.winPct);
  const duos=bestDuos(S,2).slice(0,3);
  const table=S.sort((a,b)=>b.overall-a.overall).map(s=>`<tr>
    <td>${esc(s.name)}</td><td>${s.overall}</td>
    <td style="color:var(--atk)">${s.attack}</td><td style="color:var(--def)">${s.defense}</td>
    <td>${s.games}</td><td>${s.wins}-${s.draws}-${s.losses}</td><td>${s.winPct}%</td>
    <td>${s.goals}</td><td>${s.assists}</td><td>${s.goalsFor}</td><td>${s.goalsAgainst}</td></tr>`).join('');
  view.innerHTML=`
    <div class="eyebrow">Standout players</div>
    <div class="stat-cards">
      <div class="scard hl"><div class="lab">Top rated</div><div class="who">${esc(rated.name)}</div>
        <div class="val">${rated.overall} OVR · ${rated.attack} ATK / ${rated.defense} DEF</div></div>
      <div class="scard"><div class="lab">Top scorer</div><div class="who">${esc(scorer.name)}</div><div class="val">${scorer.goals} goals</div></div>
      <div class="scard"><div class="lab">Most assists</div><div class="who">${esc(assist.name)}</div><div class="val">${assist.assists} assists</div></div>
      <div class="scard"><div class="lab">Best win rate</div><div class="who">${esc(winner.name)}</div><div class="val">${winner.winPct}% · ${winner.games} games</div></div>
      <div class="scard"><div class="lab">Matches played</div><div class="who">${state.matches.length}</div><div class="val">across the squad</div></div>
    </div>
    ${duos.length?`<div class="eyebrow">Best duos <span class="faint" style="text-transform:none;letter-spacing:0">(2+ games together)</span></div>
      ${duos.map(d=>`<div class="duo"><div><div class="names">${esc(d.a)} + ${esc(d.b)}</div>
        <div class="rec">${d.wins}W of ${d.games} together</div></div><div class="pct">${d.winPct}%</div></div>`).join('')}`:''}
    <div class="eyebrow">Full table</div>
    <div class="tablewrap card" style="padding:8px 10px"><table>
      <thead><tr><th>Player</th><th>OVR</th><th>ATK</th><th>DEF</th><th>P</th><th>W-D-L</th><th>Win%</th><th>G</th><th>A</th><th>GF</th><th>GA</th></tr></thead>
      <tbody>${table}</tbody></table></div>
    <div class="faint" style="font-size:11px;text-align:center;margin-top:12px;line-height:1.5">
      GF / GA = goals scored / conceded by the player's team while they played.</div>`;
}

function renderHistory(){
  const S=statMap();
  if(!state.matches.length){
    view.innerHTML=`<div class="empty"><div class="ico">📅</div><h3>No matches logged</h3>
      <p>Results you save on Match day will appear here, newest first. Deleting one recalculates every rating.</p></div>`;
    return;
  }
  const ms=[...state.matches].sort((a,b)=>b.date-a.date);
  view.innerHTML=`<div class="eyebrow">${state.matches.length} matches</div>`+ms.map(m=>{
    const names=ids=>ids.map(id=>S[id]?S[id].name:'?').join(', ');
    const aw=m.scoreA>m.scoreB,bw=m.scoreB>m.scoreA;
    return `<div class="match"><div class="top"><span class="date">${fmtDate(m.date)}</span>
      <button class="del" data-action="delMatch" data-id="${m.id}">Delete</button></div>
      <div class="sc"><span class="t a ${aw?'':'muted'}">${esc(names(m.teamA))}</span>
        <span><span class="n ${aw?'win':bw?'lose':''}">${m.scoreA}</span>
        <span class="faint" style="margin:0 2px">–</span>
        <span class="n ${bw?'win':aw?'lose':''}">${m.scoreB}</span></span>
        <span class="t b ${bw?'':'muted'}">${esc(names(m.teamB))}</span></div>
    </div>`;}).join('');
}

function renderGuide(){
  const avg=leagueAvgGoals(state.matches);
  const avgTxt=state.matches.length
    ?`Right now it's working from your average of about <b style="color:var(--text)">${avg.toFixed(1)}</b> goals per team.`
    :`It uses a sensible default until you've logged a few matches, then learns your group's normal scoreline.`;
  const steps=[
    ['1','Build your squad','Add your regulars in the Squad tab. If you already know someone\u2019s a strong attacker or solid at the back, set their starting ratings when you add them \u2014 otherwise everyone begins at 50.'],
    ['2','Pick teams on match day','Tap who\u2019s available this week and hit Suggest balanced teams. Shuffle for another even split, or tap any player to swap sides.'],
    ['3','Log the result','Enter the final score \u2014 that alone updates every rating. Optionally open Goals & assists to credit individual players; never required.'],
    ['4','Watch it build','Ratings, leaderboards, best duos and the full table update in Stats. History keeps every match.'],
  ];
  const stepHtml=steps.map(([n,t,d],i)=>`<div style="display:flex;gap:13px;padding:12px 0;${i<steps.length-1?'border-bottom:1px solid var(--line)':''}">
    <div style="width:26px;height:26px;border-radius:8px;background:var(--surface2);border:1px solid var(--line);
      display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--lime);flex:none">${n}</div>
    <div><div style="font-weight:700;font-size:14px;margin-bottom:3px">${t}</div>
      <div style="font-size:12.5px;color:var(--muted);line-height:1.5">${d}</div></div></div>`).join('');
  view.innerHTML=`
    <div class="eyebrow">What this is</div>
    <div class="card"><p style="margin:0;font-size:14px;line-height:1.55">
      A pocket manager for your weekly friendly. Keep a squad, pick fair teams in seconds, log the result,
      and let everyone\u2019s ratings and stats build up over the season.</p></div>

    <div class="eyebrow">Using it week to week</div>
    <div class="card" style="padding:4px 14px">${stepHtml}</div>

    <div class="eyebrow">How ratings are worked out</div>
    <div class="card"><div style="font-size:13px;line-height:1.6;color:var(--muted)">
      <p style="margin:0 0 10px"><span style="color:var(--atk);font-weight:700">Attack</span> and
      <span style="color:var(--def);font-weight:700">defence</span> are tracked separately, each 0\u2013100.
      <span style="color:var(--text)">Overall</span> is the average of the two.</p>
      <p style="margin:0 0 10px">Every match is judged against what was <i>expected</i> for that matchup \u2014 a stronger attack against a weaker defence should score more. Your <span style="color:var(--atk)">attack</span> rises when your team scores more than expected and dips when it scores fewer; your <span style="color:var(--def)">defence</span> rises when you concede fewer than expected and dips when you leak more.</p>
      <p style="margin:0 0 10px">So a 14\u201311 shoot-out rewards the attackers, while a tight 9\u20136 rewards the defenders \u2014 even in the same win.</p>
      <p style="margin:0 0 10px">\u201CExpected\u201D is measured against <span style="color:var(--text)">your own group\u2019s normal scoreline</span>, not real-world football. ${avgTxt}</p>
      <p style="margin:0">Recorded goals and assists give that player a small extra attacking nudge. Everything is recalculated from your full match history, so editing or deleting a game always keeps the numbers honest.</p>
    </div></div>

    <div class="eyebrow">Your data</div>
    <div class="card"><div style="font-size:13px;line-height:1.6;color:var(--muted)">
      <p style="margin:0 0 10px">Everything is stored on this device \u2014 nothing is sent anywhere and no account is needed.</p>
      <p style="margin:0">Use <span style="color:var(--text)">Export data</span> in the \u2022\u2022\u2022 menu now and then to keep a backup file safe.</p>
    </div></div>
    <div style="height:6px"></div>
    <button class="btn ghost" data-action="export">Export a backup now</button>
    <div class="faint" style="font-size:11px;text-align:center;margin-top:16px">Kickabout Team Sheet \u00b7 prototype</div>`;
}

// ==================== SHEETS (add / edit player) ====================
function sheet(html){const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="sheet">${html}</div>`;
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});document.querySelector('.phone').appendChild(m);return m;}
function closeSheet(){document.querySelectorAll('.modal').forEach(m=>m.remove());}
function confirmSheet(message,confirmLabel,onConfirm){
  const m=document.createElement('div');m.className='modal';
  m.innerHTML=`<div class="sheet"><h3 style="line-height:1.4">${message}</h3>
    <div class="btnrow"><button class="btn ghost" data-cf="cancel">Cancel</button>
      <button class="btn danger" data-cf="ok">${confirmLabel||'Confirm'}</button></div></div>`;
  m.addEventListener('click',e=>{
    const b=e.target.closest('[data-cf]');if(!b){if(e.target===m)m.remove();return;}
    m.remove();if(b.dataset.cf==='ok')onConfirm();
  });
  document.querySelector('.phone').appendChild(m);
}

function playerSheet(existing){
  const p=existing||{name:'',baseAttack:50,baseDefense:50};
  const m=sheet(`<h3>${existing?'Edit player':'Add player'}</h3>
    <div class="field"><label>Name</label><input type="text" id="pn" value="${esc(p.name)}" placeholder="e.g. Jamie" autocomplete="off"></div>
    <div class="field"><label>Starting attack <span class="faint">— tweak if you already know them</span></label>
      <div class="sliderow"><input type="range" id="pa" min="0" max="100" value="${p.baseAttack}"><span class="slideval" id="pav">${p.baseAttack}</span></div></div>
    <div class="field"><label>Starting defence</label>
      <div class="sliderow"><input type="range" id="pd" min="0" max="100" value="${p.baseDefense}"><span class="slideval" id="pdv">${p.baseDefense}</span></div></div>
    <div class="btnrow" style="margin-top:6px">
      ${existing?'<button class="btn ghost" data-action="deletePlayer" data-id="'+existing.id+'">Delete</button>':''}
      <button class="btn primary" data-action="savePlayer">${existing?'Save':'Add player'}</button></div>`);
  const pa=m.querySelector('#pa'),pd=m.querySelector('#pd');
  pa.oninput=()=>m.querySelector('#pav').textContent=pa.value;
  pd.oninput=()=>m.querySelector('#pdv').textContent=pd.value;
  m._editId=existing?existing.id:null;
  setTimeout(()=>m.querySelector('#pn').focus(),60);
}

// ==================== ACTIONS ====================
function suggestTeamsNow(){
  const S=statMap();
  const av=state.available.filter(id=>S[id]).map(id=>({id,overall:S[id].overall,attack:S[id].attack,defense:S[id].defense}));
  const r=suggestTeams(av);
  state.draft={teamA:r.teamA,teamB:r.teamB,alts:r.alternatives,altIdx:0,scoreA:0,scoreB:0,goals:{},assists:{},gaOpen:false};
}
function reshuffle(){
  if(!state.draft?.alts?.length)return suggestTeamsNow();
  const alts=state.draft.alts;let i=(state.draft.altIdx+1)%alts.length;
  const a=alts[i];state.draft.teamA=a.teamA.slice();state.draft.teamB=a.teamB.slice();state.draft.altIdx=i;
}

// One click handler for the whole app frame, so buttons in the header,
// the main view and pop-up sheets are all caught.
document.querySelector('.phone').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action,id=el.dataset.id,modal=el.closest('.modal');
  if(a==='menu')menuSheet();
  else if(a==='addPlayer')playerSheet();
  else if(a==='editPlayer'){const p=state.players.find(x=>x.id===id);if(p)playerSheet(p);}
  else if(a==='export')exportData();
  else if(a==='cloud'){closeSheet();cloudSheet();}
  else if(a==='cloudSave'){if(!modal)return;const u=modal.querySelector('#cloudUrl').value.trim();
    setCloudUrl(u);toast(u?'URL saved':'URL cleared');if(u)backupToCloud(false);closeSheet();cloudSheet();}
  else if(a==='cloudBackup'){if(modal){const u=modal.querySelector('#cloudUrl').value.trim();if(u)setCloudUrl(u);}backupToCloud(false);}
  else if(a==='cloudRestore'){confirmSheet('Replace everything on this device with the latest Google Sheet backup?','Restore',()=>{restoreFromCloud();});}
  else if(a==='cloudPaste'){closeSheet();pasteSheet();}
  else if(a==='doPaste'){if(!modal)return;const t=modal.querySelector('#pasteBox').value.trim();
    try{importData(JSON.parse(t));closeSheet();render();toast('Data restored');}
    catch(err){toast('That doesn\u2019t look like a valid backup','bad');}}
  else if(a==='reset'){confirmSheet('Erase all players, matches and stats? This can\u2019t be undone.','Reset everything',()=>{
    state={players:[],matches:[],available:[],draft:null};save();closeSheet();render();toast('Everything reset');});}
  else if(a==='toggleAvail'){const i=state.available.indexOf(id);
    if(i>=0)state.available.splice(i,1);else state.available.push(id);
    state.draft=null;save();render();}
  else if(a==='suggest'){suggestTeamsNow();save();render();}
  else if(a==='reshuffle'){reshuffle();render();}
  else if(a==='clearDraft'){state.draft=null;render();}
  else if(a==='movePlayer'){const d=state.draft;if(!d)return;
    if(d.teamA.includes(id)){d.teamA=d.teamA.filter(x=>x!==id);d.teamB.push(id);}
    else{d.teamB=d.teamB.filter(x=>x!==id);d.teamA.push(id);}render();}
  else if(a==='score'){const d=state.draft;if(!d)return;const t=el.dataset.t,dd=+el.dataset.d;
    if(t==='A')d.scoreA=Math.max(0,d.scoreA+dd);else d.scoreB=Math.max(0,d.scoreB+dd);render();}
  else if(a==='toggleGA'){if(state.draft){state.draft.gaOpen=!state.draft.gaOpen;render();}}
  else if(a==='ga'){const d=state.draft;if(!d)return;const f=el.dataset.f,dd=+el.dataset.d;
    d[f][id]=Math.max(0,(d[f][id]||0)+dd);render();}
  else if(a==='saveMatch')saveMatch();
  else if(a==='delMatch'){confirmSheet('Delete this match? All ratings will be recalculated.','Delete match',()=>{
    state.matches=state.matches.filter(m=>m.id!==id);save();render();toast('Match deleted');});}
  else if(a==='savePlayer'){if(!modal)return;const name=modal.querySelector('#pn').value.trim();
    if(!name){toast('Give the player a name','warn');return;}
    const ba=+modal.querySelector('#pa').value,bd=+modal.querySelector('#pd').value;
    if(modal._editId){const p=state.players.find(x=>x.id===modal._editId);p.name=name;p.baseAttack=ba;p.baseDefense=bd;}
    else state.players.push({id:uid(),name,baseAttack:ba,baseDefense:bd});
    save();closeSheet();render();toast('Saved');}
  else if(a==='deletePlayer'){confirmSheet('Remove this player? Their past matches stay but they leave the squad.','Remove player',()=>{
    state.players=state.players.filter(x=>x.id!==id);state.available=state.available.filter(x=>x!==id);
    save();closeSheet();render();toast('Player removed');});}
});

function saveMatch(){
  const d=state.draft;
  if(!d.teamA.length||!d.teamB.length){toast('Both teams need at least one player','warn');return;}
  const clean=obj=>{const o={};for(const k in obj)if(obj[k]>0)o[k]=obj[k];return o;};
  state.matches.push({id:uid(),date:Date.now(),teamA:d.teamA.slice(),teamB:d.teamB.slice(),
    scoreA:d.scoreA,scoreB:d.scoreB,goals:clean(d.goals),assists:clean(d.assists)});
  state.draft=null;state.available=[];save();
  toast('Match saved — ratings updated');tab='stats';render();
}

// ==================== EXPORT ====================
function exportData(){
  const blob=new Blob([JSON.stringify({players:state.players,matches:state.matches},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='kickabout-team-sheet-backup.json';a.click();URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

// ==================== BOOT ====================
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;
  if(tab!=='match')state.draft=null;render();});
load();render();
</script>
</body>
</html>
